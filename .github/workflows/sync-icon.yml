name: 🎨 Sync Icons

on:
  workflow_dispatch: # 允许手动点击按钮触发
  schedule:
    - cron: "0 1 * * 5" # 每周五凌晨 1 点自动运行 (UTC 时间，北京时间早上9点)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，否则无法提交代码

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 使用 Personal Access Token (PAT) 可以触发后续的 workflow (如自动发布 npm)
          # 如果不需要触发后续流程，直接用默认 token 即可
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Sync Script
        env:
          # 这些 Secrets 需要在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中设置
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: pnpm run sync-icon

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add packages/svg
          git commit -m "chore(icons): auto sync from figma [skip ci]"
          git push

      - name: Bump Version
        if: steps.git-check.outputs.changes == 'true'
        run: |
          cd packages/react
          npm version patch --no-git-tag-version
          cd ../..
          git add packages/react/package.json
          git commit -m "chore(release): bump version [skip ci]"
          git push

      - name: Build React Package
        if: steps.git-check.outputs.changes == 'true'
        run: pnpm run build:react

      - name: Setup NPM Authentication
        if: steps.git-check.outputs.changes == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to NPM
        if: steps.git-check.outputs.changes == 'true'
        run: pnpm run publish:react
